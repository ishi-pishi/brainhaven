query Me @auth(level: USER) {
  user(key: { id_expr: "auth.uid" }) {
    id
    displayName
    currencyBalance
    dailyGoalMinutes
    currentStreak
    lastGoalMetDate
    createdAt
  }
}

mutation UpdateUserProgress(
  $currencyBalance: Int,
  $currentStreak: Int,
  $lastGoalMetDate: Timestamp,
  $dailyGoalMinutes: Int
) @auth(level: USER) {
  user_update(
    key: { id_expr: "auth.uid" },
    data: {
      currencyBalance: $currencyBalance,
      currentStreak: $currentStreak,
      lastGoalMetDate: $lastGoalMetDate,
      dailyGoalMinutes: $dailyGoalMinutes
    }
  )
}

query ListRewards @auth(level: USER) {
  rewards(where: { userId: { eq_expr: "auth.uid" } }) {
    id
    name
    cost
    isOneTime
  }
}

mutation CreateReward($name: String!, $cost: Int!, $isOneTime: Boolean!) @auth(level: USER) {
  reward_insert(
    data: {
      name: $name,
      cost: $cost,
      isOneTime: $isOneTime,
      userId_expr: "auth.uid"
    }
  )
}

mutation DeleteReward($id: UUID!) @auth(level: USER) {
  reward_delete(key: { id: $id })
}

query MySubjects @auth(level: USER) {
  subjects(where: { userId: { eq_expr: "auth.uid" } }) {
    id
    name
    createdAt
  }
}

query MyStudySessions(
  $subjectId: UUID,
  $startAfter: Timestamp,
  $startBefore: Timestamp,
  $limit: Int = 1000
) @auth(level: USER) {
  studySessions(
    where: {
      userId: { eq_expr: "auth.uid" },
      subjectId: { eq: $subjectId },
      startTime: { gt: $startAfter, lt: $startBefore }
    },
    orderBy: { startTime: DESC },
    limit: $limit
  ) {
    id
    startTime
    endTime
    workBlockMs
    breakBlockMs
    intendedCycles
    productivityRating
    reflections
    earnedCurrency
    subject {
      id
      name
    }
  }
}

mutation CreateUser($displayName: String!) @auth(level: PUBLIC) {
  user_insert(
    data: {
      displayName: $displayName
    }
  )
}         

mutation CreateSubject($name: String!) @auth(level: USER) {
  subject_insert(
    data: {
      name: $name
      userId_expr: "auth.uid"
      createdAt_expr: "request.time"
    }
  )
}

mutation CreateStudySession(
  $subjectId: UUID!,
  $startTime: Timestamp!,
  $endTime: Timestamp!,
  $workBlockMs: Int!,
  $breakBlockMs: Int!,
  $intendedCycles: Int,
  $productivityRating: Int,
  $reflections: String,
  $earnedCurrency: Int!,
) @auth(level: USER) {
  studySession_insert(
    data: {
      subjectId: $subjectId,
      userId_expr: "auth.uid",
      createdAt_expr: "request.time",
      startTime: $startTime,
      endTime: $endTime,
      workBlockMs: $workBlockMs,
      breakBlockMs: $breakBlockMs,
      intendedCycles: $intendedCycles,
      productivityRating: $productivityRating,
      reflections: $reflections,
      earnedCurrency: $earnedCurrency
    }
  )
}

mutation DeleteStudySession($key: StudySession_Key!) @auth(level: USER) {
  studySession_delete(key: $key)
}

mutation UpdateSubject(
  $key: Subject_Key!,
  $name: String
) @auth(level: USER) {
  subject_update(
    key: $key,
    data: { name: $name }
  )
}

mutation DeleteSubject($id: UUID!) @auth(level: USER) @transaction {
  studySession_deleteMany(where: { subjectId: { eq: $id }, userId: { eq_expr: "auth.uid" } })
  subject_delete(key: { id: $id })
}
